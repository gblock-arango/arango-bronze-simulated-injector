command:
  - "bash"
  - "-lc"
  - "export PYTHONPATH=src && gunicorn wsgi:app --bind 0.0.0.0:${DATABRICKS_APP_PORT:-8000} --workers 1 --timeout 660"

# Single worker: in-process playback thread (PLAY/STOP/RESET).
# ``DATABRICKS_SQL_WAREHOUSE_ID``: set here for solo deploy, or override from arango-platform-bundle.

env:
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    description: "SQL warehouse id (hex) for UC DDL/DML and playback"
    value: "473d40703241ee4c"
  - name: BRONZE_INJECTOR_DATASET
    description: "Dataset key (default elliptic_bitcoin = PyG EllipticBitcoinDataset)"
    value: "elliptic_bitcoin"
  - name: BRONZE_INJECTOR_CATALOG
    value: "workspace"
  - name: BRONZE_INJECTOR_SCHEMA
    value: "default"
  - name: TEST_BRONZE_VOLUME_NAME
    description: "UC volume under catalog.schema for raw staging (workspace.default.volumes.test_bronze_data)"
    value: "test_bronze_data"
  - name: DEMO_TABLES_REGISTRY_TABLE
    description: "UC Delta registry: category (bronze|silver|gold|gold-graphlet) → table FQN"
    value: "workspace.default.demo_tables_registry"
  - name: PLAYBACK_STATE_TABLE
    description: "UC Delta table for last_row_idx and is_playing per dataset"
    value: "workspace.default.bronze_injector_playback_state"
  - name: PLAYBACK_BATCH_SIZE
    value: "200"
  - name: PLAYBACK_INTERVAL_SEC
    value: "0.25"
  - name: AUTO_ENSURE_DATASET_ON_STARTUP
    description: "When true, load test source + register demo tables on startup if missing"
    value: "true"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: ${DATABRICKS_SQL_WAREHOUSE_ID}
      permission: CAN_USE
